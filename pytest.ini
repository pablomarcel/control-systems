# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    transient_analysis/hurwitzTool/tests
    transient_analysis/routhTool/tests
    transient_analysis/icTool/tests
    transient_analysis/responseTool/tests
    root_locus_analysis/compensatorTool/tests
    root_locus_analysis/rootLocusTool/tests
    root_locus_analysis/systemResponseTool/tests
    frequency_response/experimentTool/tests
    frequency_response/plotTool/tests
    frequency_response/compensatorTool/tests
    frequency_response/bodeTool/tests
    pid_controllers/pidTool/tests
    pid_controllers/zeroPoleTool/tests
    pid_controllers/tuningTool/tests
    pid_controllers/rootLocusTool/tests
    state_space_analysis/canonicalTool/tests
    state_space_analysis/converterTool/tests
    state_space_analysis/mimoTool/tests
    state_space_analysis/stateRepTool/tests
    state_space_analysis/stateSolnTool/tests
    state_space_analysis/stateTool/tests
    state_space_analysis/stateTransTool/tests
    state_space_design/controllerTool/tests
    state_space_design/gainMatrixTool/tests
    state_space_design/lqrTool/tests
    state_space_design/minOrdTfTool/tests
    state_space_design/minOrdTool/tests
    state_space_design/observerGainMatrixTool/tests
    state_space_design/observerStatePlotTool/tests
    state_space_design/regulatorTool/tests
    state_space_design/robustTool/tests
    state_space_design/servoTool/tests
    state_space_design/statePlotsTool/tests
# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=transient_analysis
    --cov=root_locus_analysis
    --cov=frequency_response
    --cov=introduction
    --cov=fluid_systems
    --cov=mechanical_system
    --cov=control_systems
    --cov=pid_controllers
    --cov=state_space_analysis
    --cov=state_space_design
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60


# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
