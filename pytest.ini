# pytest.ini (repo root)
[pytest]
# Where to look for tests
testpaths =
    transientAnalysis/hurwitzTool/tests
    transientAnalysis/routhTool/tests
    transientAnalysis/icTool/tests
    transientAnalysis/responseTool/tests
    rootLocus/compensatorTool/tests
    rootLocus/rootLocusTool/tests
    rootLocus/systemResponseTool/tests
    frequencyResponse/experimentTool/tests
    frequencyResponse/plotTool/tests
    frequencyResponse/compensatorTool/tests
    frequencyResponse/bodeTool/tests
    pidControllers/pidTool/tests
    pidControllers/zeroPoleTool/tests
    pidControllers/tuningTool/tests
    pidControllers/rootLocusTool/tests

# Default options:
# -vv : very verbose test names
# -ra : show summary of skips/xfails
# --durations=10 : slowest 10 tests
# pytest.ini
addopts =
    -vv
    -ra
    --durations=10
    --color=yes
    --cov=transientAnalysis
    --cov=rootLocus
    --cov=frequencyResponse
    --cov=intro
    --cov=modelingFluid
    --cov=modelingMechanical
    --cov=modelingSystems
    --cov=pidControllers
    --cov=stateSpaceAnalysis
    --cov=stateSpaceDesign
    --cov-report=term-missing
    -o console_output_style=classic
    -o faulthandler_timeout=60


# Live logging to console (use logging.* in tests)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Make xfail strict so accidental passes are flagged
xfail_strict = true

# Register custom markers
markers =
    cf: closed-form / symbolic tests
    symbolic: tests requiring SymPy
    slow: slow-running tests
    batch: batch job tests

# Tame 3rd-party deprecation noise but keep our own strict
filterwarnings =
    error::DeprecationWarning:transientAnalysis\..*
    error::DeprecationWarning:rootLocus\..*
    ignore::DeprecationWarning
